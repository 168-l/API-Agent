# 商品/订单 API 测试示例
name: 电商 API 测试
description: 测试商品浏览、购物车、下单等电商核心流程
tags:
  - e-commerce
  - api
  - smoke

variables:
  product_id: null
  order_id: null
  quantity: 2

steps:
  # ============================================
  # 1. 商品相关接口
  # ============================================
  
  # 1.1 获取商品分类列表
  - name: 获取商品分类
    method: GET
    url: /categories
    expected_status_code: 200
    assertions:
      - type: status_code
        expected: 200
      - type: length_gt
        actual_path: data
        expected: 0
    extracts:
      - name: first_category_id
        expression: data.0.id
        from_response: body
  
  # 1.2 根据分类获取商品列表
  - name: 获取商品列表
    method: GET
    url: /products
    params:
      category_id: "${first_category_id}"
      page: 1
      size: 10
      sort_by: price
      order: asc
    expected_status_code: 200
    assertions:
      - type: status_code
        expected: 200
      - type: length_gt
        actual_path: data.items
        expected: 0
      - type: type_is
        actual_path: data.items.0.price
        expected: float
        message: "价格应为浮点数"
    extracts:
      - name: product_id
        expression: data.items.0.id
        from_response: body
      - name: product_price
        expression: data.items.0.price
        from_response: body
  
  # 1.3 获取商品详情
  - name: 获取商品详情
    method: GET
    url: /products/${product_id}
    expected_status_code: 200
    assertions:
      - type: status_code
        expected: 200
      - type: eq
        actual_path: data.id
        expected: "${product_id}"
      - type: gt
        actual_path: data.price
        expected: 0
        message: "商品价格应大于 0"
      - type: not_empty
        actual_path: data.name
        message: "商品名称不应为空"
      - type: not_empty
        actual_path: data.description
        message: "商品描述不应为空"
  
  # 1.4 搜索商品
  - name: 搜索商品
    method: GET
    url: /products/search
    params:
      keyword: "手机"
      min_price: 100
      max_price: 10000
    expected_status_code: 200
    assertions:
      - type: status_code
        expected: 200
      - type: length_gt
        actual_path: data
        expected: 0
  
  # ============================================
  # 2. 购物车操作
  # ============================================
  
  # 假设已经通过其他方式获得 Token
  # 2.1 添加商品到购物车
  - name: 添加到购物车
    method: POST
    url: /cart/items
    headers:
      Authorization: "Bearer ${token}"
    json:
      product_id: "${product_id}"
      quantity: "${quantity}"
    expected_status_code: 201
    assertions:
      - type: status_code
        expected: 201
      - type: eq
        actual_path: code
        expected: 0
      - type: eq
        actual_path: data.product_id
        expected: "${product_id}"
      - type: eq
        actual_path: data.quantity
        expected: "${quantity}"
  
  # 2.2 获取购物车列表
  - name: 获取购物车
    method: GET
    url: /cart
    headers:
      Authorization: "Bearer ${token}"
    expected_status_code: 200
    assertions:
      - type: status_code
        expected: 200
      - type: length_gt
        actual_path: data.items
        expected: 0
      - type: gt
        actual_path: data.total_amount
        expected: 0
        message: "总金额应大于 0"
    extracts:
      - name: cart_item_id
        expression: data.items.0.id
        from_response: body
      - name: cart_total
        expression: data.total_amount
        from_response: body
  
  # 2.3 更新购物车商品数量
  - name: 更新购物车数量
    method: PUT
    url: /cart/items/${cart_item_id}
    headers:
      Authorization: "Bearer ${token}"
    json:
      quantity: 3
    expected_status_code: 200
    assertions:
      - type: status_code
        expected: 200
      - type: eq
        actual_path: data.quantity
        expected: 3
  
  # ============================================
  # 3. 下单流程
  # ============================================
  
  # 3.1 创建订单
  - name: 创建订单
    method: POST
    url: /orders
    headers:
      Authorization: "Bearer ${token}"
    json:
      items:
        - cart_item_id: "${cart_item_id}"
      address_id: "addr_001"
      payment_method: "alipay"
      remark: "自动化测试订单"
    expected_status_code: 201
    assertions:
      - type: status_code
        expected: 201
      - type: eq
        actual_path: code
        expected: 0
      - type: not_empty
        actual_path: data.order_no
        message: "订单号不应为空"
      - type: eq
        actual_path: data.status
        expected: "pending"
        message: "初始状态应为待支付"
    extracts:
      - name: order_id
        expression: data.id
        from_response: body
      - name: order_no
        expression: data.order_no
        from_response: body
      - name: order_total
        expression: data.total_amount
        from_response: body
  
  # 3.2 获取订单详情
  - name: 获取订单详情
    method: GET
    url: /orders/${order_id}
    headers:
      Authorization: "Bearer ${token}"
    expected_status_code: 200
    assertions:
      - type: status_code
        expected: 200
      - type: eq
        actual_path: data.order_no
        expected: "${order_no}"
      - type: eq
        actual_path: data.total_amount
        expected: "${cart_total}"
        message: "订单金额应与购物车一致"
  
  # 3.3 订单列表查询
  - name: 查询订单列表
    method: GET
    url: /orders
    params:
      status: all
      page: 1
      size: 10
    headers:
      Authorization: "Bearer ${token}"
    expected_status_code: 200
    assertions:
      - type: status_code
        expected: 200
      - type: contains
        actual_path: data.items
        expected: "${order_no}"
        message: "订单列表应包含刚创建的订单"
  
  # 3.4 取消订单
  - name: 取消订单
    method: POST
    url: /orders/${order_id}/cancel
    headers:
      Authorization: "Bearer ${token}"
    expected_status_code: 200
    assertions:
      - type: status_code
        expected: 200
      - type: eq
        actual_path: data.status
        expected: "cancelled"
        message: "订单状态应为已取消"
  
  # ============================================
  # 4. 清理：删除购物车
  # ============================================
  
  - name: 清空购物车
    method: DELETE
    url: /cart/clear
    headers:
      Authorization: "Bearer ${token}"
    expected_status_code: 204
    assertions:
      - type: status_code
        expected: 204